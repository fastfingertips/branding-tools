name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint-python:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Ruff
        run: pip install ruff

      - name: Check lint
        run: ruff check tools/builder

      - name: Check formatting
        run: ruff format --check tools/builder

  lint-node:
    name: Lint (Node.js)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies (Icons)
        run: cd tools/icons && npm install

      - name: Run lint (Icons)
        run: cd tools/icons && npm run lint

      - name: Install dependencies (Downloader)
        run: cd tools/downloader && npm install

      - name: Run lint (Downloader)
        run: cd tools/downloader && npm run lint
